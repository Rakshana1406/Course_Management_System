<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Details</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#F4F7FA;
}

header{
    background:#0F766E;
    color:white;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h2{
    font-size:28px;
}

.back-btn{
    text-decoration:none;
    background:#FACC15;
    color:black;
    padding:10px 18px;
    border-radius:8px;
    font-weight:bold;
}

.container{
    width:70%;
    margin:40px auto;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.container h1{
    text-align:center;
    color:#0F766E;
    margin-bottom:25px;
}

.details p{
    font-size:18px;
    margin:15px 0;
    color:#444;
}

.details span{
    font-weight:bold;
    color:#0F766E;
}

.modules{
    margin-top:35px;
}

.modules h2{
    color:#0F766E;
    margin-bottom:15px;
}

.modules ul{
    margin-left:25px;
}

.modules li{
    margin:10px 0;
    font-size:17px;
}

.button{
    text-align:center;
    margin-top:35px;
}

.button a{
    text-decoration:none;
    background:#0F766E;
    color:white;
    padding:12px 25px;
    border-radius:8px;
}

.button a:hover{
    background:#115E59;
}

</style>

</head>

<body>

<header>

<h2>Course Details</h2>

<a href="courses.html" class="back-btn">← Back</a>

</header>

<div class="container">

<h1 id="courseTitle">Course Information</h1>

<div class="details">

<p><span>Course Name :</span> <span id="name"></span></p>

<p><span>Instructor :</span> <span id="instructor"></span></p>

<p><span>Duration :</span> <span id="duration"></span></p>

<p><span>Category :</span> <span id="category"></span></p>

<p><span>Description :</span></p>

<p id="description"></p>

</div>

<div class="modules">

<h2>Course Modules</h2>

<ul>

<li>HTML5</li>

<li>CSS3</li>

<li>Bootstrap</li>

<li>JavaScript</li>

<li>React JS</li>

<li>Node JS</li>

<li>Express JS</li>

<li>MongoDB</li>

</ul>

</div>

<div class="button">

<a href="courses.html">Back to Courses</a>

</div>

</div>

<script>

let course = JSON.parse(localStorage.getItem("course"));

if(course){

document.getElementById("courseTitle").innerHTML = course.courseName;

document.getElementById("name").innerHTML = course.courseName;

document.getElementById("instructor").innerHTML = course.instructor;

document.getElementById("duration").innerHTML = course.duration;

document.getElementById("category").innerHTML = course.category;

document.getElementById("description").innerHTML = course.description;

}
else{

document.getElementById("courseTitle").innerHTML = "Full Stack Development";

document.getElementById("name").innerHTML = "Full Stack Development";

document.getElementById("instructor").innerHTML = "John David";

document.getElementById("duration").innerHTML = "12 Weeks";

document.getElementById("category").innerHTML = "Web Development";

document.getElementById("description").innerHTML =
"This course covers HTML, CSS, JavaScript, React, Node.js, Express.js and MongoDB to build complete web applications.";

}

</script>

</body>
</html>
