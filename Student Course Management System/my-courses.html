<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Courses</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#F4F7FA;
}

header{
background:#0F766E;
color:white;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
font-size:28px;
}

.back{
background:#FACC15;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
color:black;
font-weight:bold;
}

.container{
width:90%;
margin:40px auto;
}

.container h1{
text-align:center;
color:#0F766E;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 10px rgba(0,0,0,.15);
margin-bottom:20px;
}

.card h2{
color:#0F766E;
margin-bottom:15px;
}

.card p{
margin:8px 0;
font-size:17px;
color:#555;
}

.status{
color:green;
font-weight:bold;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 22px;
background:#0F766E;
color:white;
text-decoration:none;
border-radius:8px;
}

.btn:hover{
background:#115E59;
}

.empty{
text-align:center;
font-size:20px;
color:#777;
margin-top:80px;
}

</style>

</head>

<body>

<header>

<h2>My Courses</h2>

<a href="student-dashboard.html" class="back">Dashboard</a>

</header>

<div class="container">

<h1>Enrolled Courses</h1>

<div id="courseContainer"></div>

</div>

<script>

const enrolledCourse = localStorage.getItem("enrolledCourse");

const container = document.getElementById("courseContainer");

if(enrolledCourse){

container.innerHTML = `

<div class="card">

<h2>${enrolledCourse}</h2>

<p><b>Instructor :</b> John David</p>

<p><b>Duration :</b> 12 Weeks</p>

<p><b>Status :</b>
<span class="status">Enrolled</span>
</p>

<a href="course-content.html" class="btn">
Continue Learning
</a>

</div>

`;

}
else{

container.innerHTML=`
<div class="empty">

<p>No Courses Enrolled Yet.</p>

<br>

<a href="browse-courses.html" class="btn">
Browse Courses
</a>

</div>
`;

}

</script>

</body>
</html>
