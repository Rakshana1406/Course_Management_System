<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#F8FAFC;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:420px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#0F766E;
    margin-bottom:20px;
}

.role{
    display:flex;
    margin-bottom:20px;
}

.role button{
    flex:1;
    padding:12px;
    border:none;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.admin{
    background:#0F766E;
    color:white;
    border-radius:8px 0 0 8px;
}

.student{
    background:#E5E7EB;
    color:#333;
    border-radius:0 8px 8px 0;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

.register-btn{
    width:100%;
    margin-top:25px;
    padding:12px;
    background:#0F766E;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

.register-btn:hover{
    background:#115E59;
}

.extra{
    text-align:center;
    margin-top:18px;
}

.extra a{
    color:#0F766E;
    text-decoration:none;
    font-weight:bold;
}

.extra a:hover{
    text-decoration:underline;
}

</style>

</head>
<body>

<div class="container">

<h2 id="title">Admin Registration</h2>

<div class="role">

<button class="admin" id="adminBtn" type="button">Admin</button>

<button class="student" id="studentBtn" type="button">Student</button>

</div>

<form id="registerForm">

<label>Full Name</label>
<input type="text" id="name" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Department</label>
<input type="text" id="department" required>

<label>Password</label>
<input type="password" id="password" required>

<label>Confirm Password</label>
<input type="password" id="confirmPassword" required>

<button class="register-btn">Register</button>

</form>

<div class="extra">

Already have an account?
<a href="login.html">Login</a>

</div>

</div>

<script>

let selectedRole="Admin";

const admin=document.getElementById("adminBtn");
const student=document.getElementById("studentBtn");
const title=document.getElementById("title");

admin.onclick=function(){

selectedRole="Admin";

title.innerHTML="Admin Registration";

admin.style.background="#0F766E";
admin.style.color="white";

student.style.background="#E5E7EB";
student.style.color="#333";

}

student.onclick=function(){

selectedRole="Student";

title.innerHTML="Student Registration";

student.style.background="#0F766E";
student.style.color="white";

admin.style.background="#E5E7EB";
admin.style.color="#333";

}

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const department=document.getElementById("department").value;
const password=document.getElementById("password").value;
const confirm=document.getElementById("confirmPassword").value;

if(password!=confirm){

alert("Passwords do not match!");

return;

}

const user={

role:selectedRole,
name:name,
email:email,
department:department,
password:password

};

localStorage.setItem("user",JSON.stringify(user));

alert("Registration Successful!");

window.location.href="login.html";

});

</script>

</body>
</html>
