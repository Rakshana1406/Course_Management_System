<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#F8FAFC;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:420px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#0F766E;
    margin-bottom:15px;
}

p{
    text-align:center;
    color:#555;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

.options{
    margin-top:10px;
}

.options label{
    font-size:14px;
    font-weight:normal;
    display:flex;
    align-items:center;
    gap:5px;
}

.options input{
    width:auto;
}

button{
    width:100%;
    margin-top:25px;
    padding:12px;
    background:#0F766E;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#115E59;
}

.back{
    text-align:center;
    margin-top:20px;
}

.back a{
    text-decoration:none;
    color:#0F766E;
    font-weight:bold;
}

.back a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<h2>Reset Password</h2>

<p>Create a new password for your account.</p>

<form id="resetForm">

<label>New Password</label>
<input type="password"
id="newPassword"
placeholder="Enter New Password"
required>

<label>Confirm Password</label>
<input type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<div class="options">

<label>
<input type="checkbox" onclick="showPassword()">
Show Password
</label>

</div>

<button type="submit">
Reset Password
</button>

</form>

<div class="back">
<a href="login.html">← Back to Login</a>
</div>

</div>

<script>

function showPassword(){

const pass1=document.getElementById("newPassword");
const pass2=document.getElementById("confirmPassword");

if(pass1.type==="password"){

pass1.type="text";
pass2.type="text";

}
else{

pass1.type="password";
pass2.type="password";

}

}

document.getElementById("resetForm").addEventListener("submit",function(e){

e.preventDefault();

const newPassword=document.getElementById("newPassword").value;
const confirmPassword=document.getElementById("confirmPassword").value;

if(newPassword!==confirmPassword){

alert("Passwords do not match!");
return;

}

const user=JSON.parse(localStorage.getItem("user"));

if(user==null){

alert("No registered account found!");

window.location.href="register.html";

return;

}

user.password=newPassword;

localStorage.setItem("user",JSON.stringify(user));

alert("Password Reset Successfully!");

window.location.href="login.html";

});

</script>

</body>
</html>
