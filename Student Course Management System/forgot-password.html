<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#F8FAFC;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#0F766E;
    margin-bottom:15px;
}

p{
    text-align:center;
    color:#555;
    margin-bottom:25px;
    line-height:1.5;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    margin-top:25px;
    background:#0F766E;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#115E59;
}

.back{
    text-align:center;
    margin-top:20px;
}

.back a{
    color:#0F766E;
    text-decoration:none;
    font-weight:bold;
}

.back a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<h2>Forgot Password</h2>

<p>
Enter your registered email address to reset your password.
</p>

<form id="forgotForm">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your registered email"
required>

<button type="submit">
Verify Email
</button>

</form>

<div class="back">

<a href="login.html">
← Back to Login
</a>

</div>

</div>

<script>

document.getElementById("forgotForm").addEventListener("submit",function(e){

e.preventDefault();

const email=document.getElementById("email").value;

const user=JSON.parse(localStorage.getItem("user"));

if(user==null){

alert("No account found. Please register first.");

window.location.href="register.html";

return;

}

if(email===user.email){

alert("Email Verified Successfully.");

window.location.href="reset-password.html";

}
else{

alert("Email not found.");

}

});

</script>

</body>
</html>
