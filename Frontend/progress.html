<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Progress</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#F4F7FA;
}

header{
background:#0F766E;
color:white;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
font-size:28px;
}

.back{
background:#FACC15;
color:black;
text-decoration:none;
padding:10px 18px;
border-radius:8px;
font-weight:bold;
}

.container{
width:90%;
margin:40px auto;
}

.container h1{
text-align:center;
color:#0F766E;
margin-bottom:35px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 12px rgba(0,0,0,.15);
margin-bottom:30px;
}

.card h2{
color:#0F766E;
margin-bottom:20px;
}

.progress-bar{
width:100%;
height:28px;
background:#ddd;
border-radius:30px;
overflow:hidden;
}

.progress{
width:75%;
height:100%;
background:#0F766E;
color:white;
text-align:center;
line-height:28px;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th{
background:#0F766E;
color:white;
padding:15px;
}

table td{
padding:15px;
text-align:center;
border-bottom:1px solid #ddd;
}

.completed{
color:green;
font-weight:bold;
}

.pending{
color:red;
font-weight:bold;
}

.btn{
display:inline-block;
margin-top:30px;
padding:14px 25px;
background:#0F766E;
color:white;
text-decoration:none;
border-radius:8px;
}

.btn:hover{
background:#115E59;
}

</style>

</head>

<body>

<header>

<h2>Learning Progress</h2>

<a href="materials.html" class="back">← Back</a>

</header>

<div class="container">

<h1>Course Progress</h1>

<div class="card">

<h2>Overall Progress</h2>

<div class="progress-bar">
<div class="progress">75%</div>
</div>

</div>

<div class="card">

<h2>Module Completion</h2>

<table>

<tr>
<th>Module</th>
<th>Status</th>
</tr>

<tr>
<td>HTML Basics</td>
<td class="completed">Completed</td>
</tr>

<tr>
<td>CSS</td>
<td class="completed">Completed</td>
</tr>

<tr>
<td>JavaScript</td>
<td class="completed">Completed</td>
</tr>

<tr>
<td>Bootstrap</td>
<td class="completed">Completed</td>
</tr>

<tr>
<td>React JS</td>
<td class="completed">Completed</td>
</tr>

<tr>
<td>Node JS</td>
<td class="completed">Completed</td>
</tr>

<tr>
<td>Express JS</td>
<td class="pending">Pending</td>
</tr>

<tr>
<td>MongoDB</td>
<td class="pending">Pending</td>
</tr>

</table>

<center>

<a href="certificate.html" class="btn">
View Certificate
</a>

</center>

</div>

</div>

</body>
</html>
