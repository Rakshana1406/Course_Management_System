<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enrollment Successful</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#F4F7FA;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
width:450px;
padding:40px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
text-align:center;
}

.check{
font-size:70px;
color:green;
margin-bottom:20px;
}

h1{
color:#0F766E;
margin-bottom:15px;
}

p{
font-size:18px;
color:#555;
margin-bottom:25px;
line-height:1.6;
}

span{
color:#0F766E;
font-weight:bold;
}

.btn{
display:inline-block;
padding:12px 25px;
background:#0F766E;
color:white;
text-decoration:none;
border-radius:8px;
margin:10px;
}

.btn:hover{
background:#115E59;
}

</style>

</head>

<body>

<div class="container">

<div class="check">
✔
</div>

<h1>Enrollment Successful!</h1>

<p>

You have successfully enrolled in

<br><br>

<span id="courseName"></span>

</p>

<a href="my-courses.html" class="btn">
My Courses
</a>

<a href="browse-courses.html" class="btn">
Browse More
</a>

</div>

<script>

const course = localStorage.getItem("enrolledCourse");

document.getElementById("courseName").innerHTML = course;

</script>

</body>
</html>
